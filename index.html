<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Gemini Omni Pro v3.5 (Vercel Edition)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0b0d11; --sidebar: #15191f; --card: #1b2028; --accent: #3b82f6; --text: #f8fafc; --border: #2d3748; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px; }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-box { flex: 1; padding: 30px 15%; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 15px; font-size: 15px; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .bot-msg { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .footer { padding: 20px 15%; background: var(--bg); }
        .input-group { background: var(--card); border: 1px solid var(--border); border-radius: 25px; padding: 8px 15px; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; }
        .btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 18px; }
        .send { background: var(--accent); color: white; width: 35px; height: 35px; border-radius: 50%; }
        #preView { display: none; position: absolute; bottom: 90px; left: 15%; background: var(--card); padding: 5px; border-radius: 8px; border: 1px solid var(--border); }
        #preImg { height: 50px; border-radius: 4px; }
    </style>
</head>
<body>
    <aside class="sidebar"><h2>Gemini Pro</h2><p style="font-size:12px; color:gray;">Proxy Mode Active</p></aside>
    <main class="main">
        <div class="chat-box" id="box"><div class="msg bot-msg">Система запущена через Vercel API. Теперь вылетов быть не должно!</div></div>
        <div id="preView"><img id="preImg"></div>
        <footer class="footer">
            <div class="input-group">
                <input type="file" id="fIn" hidden onchange="showImg(this)">
                <button class="btn" onclick="document.getElementById('fIn').click()"><i class="fas fa-camera"></i></button>
                <input type="text" id="uIn" placeholder="Напиши сообщение..." onkeydown="if(event.key==='Enter') send()">
                <button class="btn send" onclick="send()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </footer>
    </main>
    <script>
        let imgB64 = null;
        function showImg(i){
            const r=new FileReader();
            r.onload=(e)=>{ imgB64=e.target.result.split(',')[1]; document.getElementById('preImg').src=e.target.result; document.getElementById('preView').style.display='block'; };
            r.readAsDataURL(i.files[0]);
        }
        async function send(){
            const t=document.getElementById('uIn').value; if(!t && !imgB64) return;
            addMsg(t,'user',imgB64); document.getElementById('uIn').value='';
            const b=addMsg('Обработка запроса...','bot');
            const curImg=imgB64; imgB64=null; document.getElementById('preView').style.display='none';
            try {
                const r = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: t, image: curImg })
                });
                const d = await r.json();
                b.innerText = d.text || "Ошибка: " + d.error;
            } catch(e) { b.innerText = "Ошибка сервера. Проверь логи Vercel."; }
        }
        function addMsg(t,s,i){
            const d=document.createElement('div'); d.className=`msg ${s}-msg`;
            if(i){ const img=document.createElement('img'); img.src=`data:image/jpeg;base64,${i}`; img.style.width='100%'; img.style.borderRadius='8px'; d.appendChild(img); }
            const sp=document.createElement('span'); sp.innerText=t; d.appendChild(sp);
            document.getElementById('box').appendChild(d); document.getElementById('box').scrollTop=9999; return sp;
        }
    </script>
</body>
</html>
