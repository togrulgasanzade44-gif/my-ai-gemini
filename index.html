<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Omni-Intelligence v3.6 (CV Edition)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-deep: #050609;
            --bg-card: rgba(23, 27, 39, 0.7);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(45, 55, 72, 0.5);
            --glass: blur(12px) saturate(180%);
            --radius: 20px; /* Твой любимый радиус */
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.03) 0%, transparent 40%);
        }

        /* --- SIDEBAR (Glassmorphism) --- */
        .sidebar {
            width: 300px;
            background: var(--bg-card);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px;
            z-index: 10;
        }

        .brand {
            font-size: 22px;
            font-weight: 800;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-new {
            background: linear-gradient(135deg, var(--accent), #1d4ed8);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px var(--accent-glow);
            transition: var(--transition);
        }

        .btn-new:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }

        .history { flex: 1; overflow-y: auto; margin-top: 30px; }
        .history-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); margin-bottom: 15px; letter-spacing: 0.1em; }
        .history-item { padding: 12px; border-radius: 10px; color: var(--text-dim); cursor: pointer; transition: var(--transition); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
        .history-item:hover { background: rgba(255,255,255,0.03); color: white; }

        /* --- MAIN CHAT --- */
        .chat-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-messages {
            flex: 1;
            padding: 50px 12%;
            overflow-y: auto;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .message-row { display: flex; flex-direction: column; animation: slideUp 0.4s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .message {
            max-width: 80%;
            padding: 18px 25px;
            font-size: 16px;
            line-height: 1.6;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .user-row { align-items: flex-end; }
        .user-message {
            background: linear-gradient(135deg, var(--accent), #1d4ed8);
            color: white;
            border-radius: 25px 25px 5px 25px;
        }

        .bot-row { align-items: flex-start; }
        .bot-message {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 25px 25px 25px 5px;
            backdrop-filter: var(--glass);
        }

        .msg-img { max-width: 250px; border-radius: 15px; margin-bottom: 12px; display: block; border: 2px solid var(--border); }

        /* --- INPUT AREA (Floating) --- */
        .chat-footer {
            padding: 30px 12%;
            position: relative;
        }

        .input-card {
            background: var(--bg-card);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 10px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: var(--transition);
        }

        .input-card:focus-within { border-color: var(--accent); box-shadow: 0 10px 50px var(--accent-glow); }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 12px;
            font-size: 16px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 20px;
            cursor: pointer;
            padding: 10px;
            transition: var(--transition);
            border-radius: 50%;
        }

        .btn-icon:hover { color: var(--accent); background: rgba(59, 130, 246, 0.1); }
        .btn-icon.active-mic { color: #ef4444; animation: pulseMic 1.5s infinite; }

        @keyframes pulseMic { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .btn-send {
            background: var(--accent);
            color: white;
            font-size: 18px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .btn-send:hover { transform: scale(1.1) rotate(-15deg); box-shadow: 0 0 20px var(--accent-glow); }

        /* Превью фото */
        #previewContainer {
            display: none;
            position: absolute;
            bottom: 110px;
            left: 12%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 10px;
            backdrop-filter: var(--glass);
            z-index: 5;
        }
        #imagePreview { height: 80px; border-radius: 10px; display: block; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <i class="fas fa-brain"></i>
            <span>Omni Pro v3.6</span>
        </div>
        <button class="btn-new" onclick="createNewChat()">
            <i class="fas fa-plus"></i>
            <span>Новый диалог</span>
        </button>
        <div class="history">
            <div class="history-label">История (CV Showcase)</div>
            <div class="history-item"><i class="far fa-comment"></i> Как создать сайт...</div>
            <div class="history-item"><i class="far fa-comment"></i> Ошибка в Node.js</div>
            <div class="history-item"><i class="far fa-comment"></i> Rounded CSS styles</div>
        </div>
    </aside>

    <main class="chat-view">
        <div class="chat-messages" id="chatMessages">
            <div class="message-row bot-row">
                <div class="message bot-message">
                    Привет! Я твой обновленный Gemini Omni Pro. Дизайн идеален, масштаб подправлен, закругления 20px. <b>Фото</b>, <b>Enter</b> и <b>Голос</b> работают. Жду команду!
                </div>
            </div>
        </div>

        <div id="previewContainer">
            <img id="imagePreview" src="">
            <i class="fas fa-times-circle" style="position:absolute; top:-8px; right:-8px; color:#ef4444; cursor:pointer;" onclick="removeImage()"></i>
        </div>

        <footer class="chat-footer">
            <div class="input-card">
                <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(this)">
                <button class="btn-icon" onclick="document.getElementById('fileInput').click()"><i class="fas fa-image"></i></button>
                <button class="btn-icon" id="micBtn" onclick="toggleMic()"><i class="fas fa-microphone"></i></button>
                
                <input type="text" id="userInput" placeholder="Напиши или скажи что-нибудь..." onkeydown="if(event.key==='Enter') handleSend()">
                
                <button class="btn-icon btn-send" onclick="handleSend()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </footer>
    </main>

    <script>
        // ТВОЙ КЛЮЧ ИСПРАВЛЕН И ВСТАВЛЕН
        const API_KEY = "AIzaSyBbqJg9nqRHSH8IKnNqn75j-GgfABI6mFk"; 
        let currentImageBase64 = null;
        const messages = document.getElementById('chatMessages');
        const input = document.getElementById('userInput');

        // --- ЛОГИКА ОТПРАВКИ ---

        async function handleSend() {
            const text = input.value.trim();
            if (!text && !currentImageBase64) return;

            addMessage(text, 'user', currentImageBase64);
            input.value = '';
            
            const tempImg = currentImageBase64;
            removeImage(); // Очищаем превью

            const botMsgDiv = addMessage("Думаю...", 'bot');

            try {
                const parts = [{ text: text }];
                if (tempImg) {
                    parts.push({ inline_data: { mime_type: "image/jpeg", data: tempImg } });
                }

                // ПРЯМОЙ ЗАПРОС К API GOOGLE (Обойдем Vercel ошибки)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts }] })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    botMsgDiv.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    botMsgDiv.innerText = "Ошибка: " + (data.error ? data.error.message : "Пустой ответ");
                }
            } catch (err) {
                botMsgDiv.innerText = "Критическая ошибка связи. Проверьте интернет.";
                console.error(err);
            }
        }

        // --- УТИЛИТЫ ЧАТА ---

        function addMessage(text, sender, imgData = null) {
            const row = document.createElement('div');
            row.className = `message-row ${sender}-row`;
            
            const msg = document.createElement('div');
            msg.className = `message ${sender}-message`;
            
            if (imgData) {
                const img = document.createElement('img');
                img.src = `data:image/jpeg;base64,${imgData}`;
                img.className = 'msg-img';
                div.appendChild(img);
            }
            
            const span = document.createElement('span');
            span.innerText = text;
            msg.appendChild(span);
            
            row.appendChild(msg);
            messages.appendChild(row);
            messages.scrollTop = messages.scrollHeight;
            return span;
        }

        function createNewChat() {
            messages.innerHTML = '';
            addMessage("Новый диалог начат. Жду твой запрос!", 'bot');
        }

        // --- ФОТО ЛОГИКА ---

        function handleImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentImageBase64 = e.target.result.split(',')[1];
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('previewContainer').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function removeImage() {
            currentImageBase64 = null;
            document.getElementById('previewContainer').style.display = 'none';
            document.getElementById('fileInput').value = '';
        }

        // --- ГОЛОСОВОЙ ВВОД (ВЕРНУЛ) ---

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ru-RU';
        recognition.continuous = false; // Слушаем одну фразу

        function toggleMic() {
            const micBtn = document.getElementById('micBtn');
            if (micBtn.classList.contains('active-mic')) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        recognition.onstart = () => {
            document.getElementById('micBtn').classList.add('active-mic');
        };

        recognition.onend = () => {
            document.getElementById('micBtn').classList.remove('active-mic');
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            input.value = transcript;
            input.focus();
        };

        recognition.onerror = (err) => {
            console.error("Mic error:", err);
            addMessage("Ошибка микрофона. Убедитесь, что разрешили доступ.", 'bot');
        };
    </script>
</body>
</html>
