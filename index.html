<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Omni Pro v3.5</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b0d11;
            --bg-sidebar: #15191f;
            --bg-card: #1b2028;
            --accent: #3b82f6;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #2d3748;
            --radius: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        .sidebar { width: 280px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; }
        .logo { font-size: 22px; font-weight: 800; color: var(--accent); margin-bottom: 35px; display: flex; align-items: center; gap: 12px; }
        .history-item { padding: 12px; border-radius: 12px; color: var(--text-dim); cursor: pointer; transition: 0.2s; font-size: 14px; margin-bottom: 5px; }
        .history-item:hover { background: var(--border); color: white; }

        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-header { height: 70px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 30px; justify-content: space-between; }
        .chat-box { flex: 1; padding: 40px 15%; overflow-y: auto; display: flex; flex-direction: column; gap: 25px; scroll-behavior: smooth; }
        
        .msg { max-width: 85%; padding: 16px 22px; border-radius: 22px; line-height: 1.6; font-size: 15px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } }
        
        .user-msg { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .bot-msg { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .msg-img { max-width: 250px; border-radius: 12px; margin-bottom: 10px; display: block; border: 2px solid var(--border); }

        .footer { padding: 30px 15%; background: var(--bg-dark); }
        .input-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 35px; padding: 10px 20px; display: flex; align-items: center; gap: 15px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; outline: none; font-size: 16px; }
        
        .tool-btn { background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; padding: 8px; }
        .send-btn { background: var(--accent); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }

        #previewContainer { display: none; padding: 10px; position: absolute; bottom: 110px; left: 15%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 15px; z-index: 10; }
        #imagePreview { height: 80px; border-radius: 10px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo"><i class="fas fa-robot"></i> Gemini Pro</div>
        <div class="history-item">Как создать сайт...</div>
        <div class="history-item">Ошибка в Node.js</div>
        <div class="history-item">Rounded CSS styles</div>
    </aside>

    <main class="main-chat">
        <header class="chat-header">
            <span style="font-weight: 600; font-size: 14px;"><i class="fas fa-circle" style="color: #10b981; font-size: 8px; margin-right: 8px;"></i> Система готова</span>
        </header>

        <div class="chat-box" id="chatBox">
            <div class="msg bot-msg">Бро, я на связи! Теперь всё работает: <b>Enter</b>, <b>Фото</b> и <b>Голос</b>. Жги!</div>
        </div>

        <div id="previewContainer">
            <img id="imagePreview" src="">
            <i class="fas fa-times-circle" style="position: absolute; top: -5px; right: -5px; cursor: pointer; color: #ef4444;" onclick="removeImage()"></i>
        </div>

        <footer class="footer">
            <div class="input-container">
                <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(this)">
                <button class="tool-btn" onclick="document.getElementById('fileInput').click()"><i class="fas fa-image"></i></button>
                <button class="tool-btn" id="micBtn" onclick="startVoice()"><i class="fas fa-microphone"></i></button>
                
                <input type="text" id="userInput" placeholder="Напиши что-нибудь..." onkeydown="if(event.key === 'Enter') handleSend()">
                
                <button class="send-btn" onclick="handleSend()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </footer>
    </main>

    <script>
        // ТВОЙ РАБОЧИЙ КЛЮЧ ИЗ СКРИНА
        const API_KEY = "AIzaSyBbqJg9nqRHSH8IKnNqn75j-GgfABI6mFk"; 
        let currentImageBase64 = null;

        function handleImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentImageBase64 = e.target.result.split(',')[1];
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('previewContainer').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function removeImage() {
            currentImageBase64 = null;
            document.getElementById('previewContainer').style.display = 'none';
            document.getElementById('fileInput').value = '';
        }

        async function handleSend() {
            const text = document.getElementById('userInput').value.trim();
            if (!text && !currentImageBase64) return;

            addMessage(text, 'user', currentImageBase64);
            document.getElementById('userInput').value = '';
            const tempImg = currentImageBase64;
            removeImage();

            const botMsgDiv = addMessage("Думаю...", 'bot');

            try {
                const parts = [{ text: text }];
                if (tempImg) {
                    parts.push({ inline_data: { mime_type: "image/jpeg", data: tempImg } });
                }

                // ИСПРАВЛЕННЫЙ URL (Модель заменена на gemini-1.5-flash-latest)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts }] })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    botMsgDiv.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    botMsgDiv.innerText = "Ошибка: " + (data.error ? data.error.message : "Пустой ответ");
                }
            } catch (err) {
                botMsgDiv.innerText = "Ошибка сети. Проверь интернет.";
            }
        }

        function addMessage(text, sender, imgData = null) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `msg ${sender}-msg`;
            
            if (imgData) {
                const img = document.createElement('img');
                img.src = `data:image/jpeg;base64,${imgData}`;
                img.className = 'msg-img';
                div.appendChild(img);
            }
            
            const span = document.createElement('span');
            span.innerText = text;
            div.appendChild(span);
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return span;
        }

        function startVoice() {
            const micBtn = document.getElementById('micBtn');
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'ru-RU';
            recognition.onstart = () => micBtn.style.color = '#ef4444';
            recognition.onend = () => micBtn.style.color = '';
            recognition.onresult = (event) => {
                document.getElementById('userInput').value = event.results[0][0].transcript;
            };
            recognition.start();
        }
    </script>
</body>
</html>
