<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Pro v3.6 (CV Final Build)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-deep: #0b0e14;
            --bg-sidebar: rgba(20, 24, 33, 0.8);
            --bg-card: #181c25;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(45, 55, 72, 0.7);
            --glass: blur(15px) saturate(180%);
            --radius: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
        }

        .sidebar {
            width: 300px;
            background: var(--bg-sidebar);
            backdrop-filter: var(--glass);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        .brand {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-new {
            background: linear-gradient(135deg, var(--accent), #1d4ed8);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--accent-glow);
            transition: var(--transition);
        }

        .btn-new:hover { transform: translateY(-2px); }

        .history { flex: 1; overflow-y: auto; margin-top: 30px; }
        .history-item { padding: 12px; border-radius: 10px; color: var(--text-dim); cursor: pointer; transition: var(--transition); font-size: 14px; margin-bottom: 5px; }
        .history-item:hover { background: rgba(255,255,255,0.03); color: white; }

        .chat-view { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        .chat-messages {
            flex: 1;
            padding: 50px 12%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .message {
            max-width: 80%;
            padding: 18px 25px;
            font-size: 16px;
            line-height: 1.6;
            border-radius: var(--radius);
            animation: slideUp 0.3s ease forwards;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-row { align-self: flex-end; }
        .user-message { background: var(--accent); color: white; border-bottom-right-radius: 4px; }

        .bot-row { align-self: flex-start; }
        .bot-message { background: var(--bg-card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        .chat-footer { padding: 30px 12%; }
        .input-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 10px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        #userInput { flex: 1; background: transparent; border: none; color: white; font-size: 16px; }

        .btn-icon { background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; transition: var(--transition); }
        .btn-icon:hover { color: var(--accent); }
        .btn-icon.active-mic { color: #ef4444; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .btn-send { background: var(--accent); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer;}
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand"><i class="fas fa-brain"></i> <span>Omni Pro 3.6</span></div>
        <button class="btn-new" onclick="location.reload()">Новый диалог</button>
        <div class="history">
            <div class="history-item"><i class="far fa-comment"></i> История загружена...</div>
        </div>
    </aside>

    <main class="chat-view">
        <div class="chat-messages" id="chatBox">
            <div class="message bot-row bot-message">
                Система готова! Я добавил проверку ответов, чтобы код не ломался. Жду твой запрос!
            </div>
        </div>

        <footer class="chat-footer">
            <div class="input-card">
                <button class="btn-icon" id="micBtn" onclick="toggleVoice()"><i class="fas fa-microphone"></i></button>
                <input type="text" id="uInp" placeholder="Напиши что-нибудь..." onkeydown="if(event.key==='Enter') send()">
                <button class="btn-send" onclick="send()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </footer>
    </main>

    <script>
        const API_KEY = "AIzaSyBbqJg9nqRHSH8IKnNqn75j-GgfABI6mFk";
        const chatBox = document.getElementById('chatBox');
        const uInp = document.getElementById('uInp');

        async function send() {
            const val = uInp.value.trim();
            if(!val) return;

            addMsg(val, 'user');
            uInp.value = '';
            const botMsg = addMsg("Думаю...", 'bot');

            try {
                // Прямой вызов Gemini 1.5 Flash через стабильный v1 API
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });

                const data = await res.json();
                
                // Проверка структуры ответа для защиты от TypeError
                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                    botMsg.innerText = data.candidates[0].content.parts[0].text;
                } else if (data.error) {
                    botMsg.innerText = "Ошибка Google: " + data.error.message;
                } else {
                    botMsg.innerText = "Ответ от API не содержит текста. Проверь консоль.";
                    console.log("Response:", data);
                }
            } catch (e) {
                botMsg.innerText = "Критическая ошибка сети.";
                console.error(e);
            }
        }

        function addMsg(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}-row ${type}-message`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'ru-RU';

        function toggleVoice() {
            const btn = document.getElementById('micBtn');
            if(btn.classList.contains('active-mic')) { rec.stop(); } else { rec.start(); }
        }

        rec.onstart = () => document.getElementById('micBtn').classList.add('active-mic');
        rec.onend = () => document.getElementById('micBtn').classList.remove('active-mic');
        rec.onresult = (e) => { uInp.value = e.results[0][0].transcript; uInp.focus(); };
    </script>
</body>
</html>
